name: Test ML4CO-Kit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install relatived package
      run: |
        sudo apt-get update
        sudo apt-get install make
        sudo apt-get install cmake
        sudo apt-get install flex 
        sudo apt-get install bison 
        sudo apt-get install zlib1g-dev 
        sudo apt-get install libbz2-dev
        sudo apt-get install libfl-dev
        sudo apt-get install libboost-all-dev
        sudo apt-get install libcairo2
        sudo apt install clang
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements.txt
        python tests/install_env.py
    - name: Test using pytest
      run: |
        pip install pytest
        python -m pip install pytest-cov
        pytest --cov=ml4co_kit --cov-report=xml --cov-append
    - name: Upload to codecov
      uses: codecov/codecov-action@v3
      if: matrix.python-version == '3.9'
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: Thinklab-SJTU/ML4CO-Kit
        
  macos:

    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install native build dependencies (Homebrew)
      run: |
        brew update
        brew install cmake boost flex bison
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements.txt
        python tests/install_env.py
        if [[ "${{ matrix.python-version }}" =~ ^3\.(9|10|11)$ ]]; then
          pip install setuptools==80.9.0
        fi
    - name: Test using pytest
      run: |
        pip install pytest
        python -m pip install pytest-cov
        pytest --cov=ml4co_kit --cov-report=xml --cov-append