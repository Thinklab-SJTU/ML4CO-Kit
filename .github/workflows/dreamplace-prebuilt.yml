name: DreamPlace Pre-built

on:
  workflow_dispatch:

jobs:
  linux:

    # Match minimum supported Linux baseline (glibc 2.35, Ubuntu 22.04).
    # ubuntu-latest (24.04+) links against GLIBC_2.38+ and breaks older systems.
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash -el {0}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          activate-environment: ml4co-dp-build
          channel-priority: strict

      - name: Linux — native build deps
        run: |
          sudo apt-get update
          sudo apt-get install make
          sudo apt-get install cmake
          sudo apt-get install flex 
          sudo apt-get install bison 
          sudo apt-get install zlib1g-dev 
          sudo apt-get install libbz2-dev
          sudo apt-get install libfl-dev
          sudo apt-get install libboost-all-dev
          sudo apt-get install libcairo2
          sudo apt install clang

      - name: Install Python deps and build DreamPlace
        run: |
          cd "${GITHUB_WORKSPACE}"
          python -m pip install --upgrade pip
          pip install packaging
          pip install -r tests/requirements.txt
          python scripts/dreamplace_prebuild.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreamplace-${{ runner.os }}-py${{ matrix.python-version }}-cpu
          path: dist/*.zip
          if-no-files-found: error

  macos:

    runs-on: macos-latest
    defaults:
      run:
        shell: bash -el {0}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          activate-environment: ml4co-dp-build
          channel-priority: strict

      - name: macOS — Homebrew deps
        run: |
          brew update
          brew install cmake boost flex bison libomp

      - name: Install Python deps and build DreamPlace
        run: |
          cd "${GITHUB_WORKSPACE}"
          python -m pip install --upgrade pip
          pip install packaging
          pip install -r tests/requirements.txt
          python scripts/dreamplace_prebuild.py
          if [[ "${{ matrix.python-version }}" =~ ^3\.(9|10|11)$ ]]; then
            pip install setuptools==80.9.0
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreamplace-${{ runner.os }}-py${{ matrix.python-version }}-cpu
          path: dist/*.zip
          if-no-files-found: error
