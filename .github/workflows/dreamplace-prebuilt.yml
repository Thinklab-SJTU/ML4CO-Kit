name: DreamPlace Pre-built

on:
  workflow_dispatch:

jobs:
  linux:
    name: ubuntu-latest / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          activate-environment: ml4co-dp-build
          channel-priority: strict

      - name: Linux — native build deps (align with python-package.yml)
        run: |
          sudo apt-get update
          sudo apt-get install -y make cmake zlib1g-dev flex bison clang \
            libboost-thread-dev libboost-system-dev libboost-filesystem-dev \
            libboost-graph-dev libboost-regex-dev libcairo2

      - name: Install Python deps and build DreamPlace (DreamPlaceSolver.install)
        run: |
          cd "${GITHUB_WORKSPACE}"
          python -m pip install --upgrade pip
          pip install packaging
          pip install -r tests/requirements.txt
          python tests/install_env.py

      - name: Zip dreamplace from conda site-packages
        run: |
          cd "${GITHUB_WORKSPACE}"
          python scripts/dreamplace_prebuild.py --out-dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreamplace-${{ runner.os }}-py${{ matrix.python-version }}-cpu
          path: dist/*.zip
          if-no-files-found: error

  macos:
    name: macos-latest / py${{ matrix.python-version }}
    runs-on: macos-latest
    defaults:
      run:
        shell: bash -el {0}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          activate-environment: ml4co-dp-build
          channel-priority: strict

      - name: macOS — Homebrew deps
        run: |
          brew update
          brew install cmake boost flex bison

      - name: Install Python deps and build DreamPlace (DreamPlaceSolver.install)
        run: |
          cd "${GITHUB_WORKSPACE}"
          python -m pip install --upgrade pip
          pip install packaging
          pip install -r tests/requirements.txt
          python tests/install_env.py
          if [[ "${{ matrix.python-version }}" =~ ^3\.(9|10|11)$ ]]; then
            pip install setuptools==80.9.0
          fi

      - name: Zip dreamplace from conda site-packages
        run: |
          cd "${GITHUB_WORKSPACE}"
          python scripts/dreamplace_prebuild.py --out-dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreamplace-${{ runner.os }}-py${{ matrix.python-version }}-cpu
          path: dist/*.zip
          if-no-files-found: error
