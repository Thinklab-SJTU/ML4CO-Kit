# =========================================
# ISPD2005 / adaptec2
# =========================================

# -------- inputs (set these to your benchmark files) --------
aux_input: "./adaptec2.aux"

# -------- runtime / reproducibility --------
gpu: 1
dtype: float32
num_threads: 8
random_seed: 1000
deterministic_flag: 1

# -------- global knobs --------
target_density: 1.0
density_weight: 8.0e-5
gamma: 4.0
scale_factor: 1.0
ignore_net_degree: 100
enable_fillers: 1
gp_noise_ratio: 0.025
stop_overflow: 0.07

# -------- stage flags / outputs --------
global_place_flag: 1
legalize_flag: 1
detailed_place_flag: 1
plot_flag: 0
result_dir: results

# -------- detailed placement (optional) --------
detailed_place_engine: ""
detailed_place_command: ""

# -------- initialization tweaks --------
random_center_init_flag: 1
gift_init_flag: 0
sort_nets_by_degree: 0

# -------- design-specific bins / stages --------
num_bins_x: 1024
num_bins_y: 1024
global_place_stages:
  - num_bins_x: 1024
    num_bins_y: 1024
    iteration: 1000
    learning_rate: 0.01
    wirelength: weighted_average
    optimizer: nesterov
    Llambda_density_weight_iteration: 1
    Lsub_iteration: 1
